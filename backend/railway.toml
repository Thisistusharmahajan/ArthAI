# Railway deployment — run from backend/ directory
# Set these env vars in Railway dashboard:
# ANTHROPIC_API_KEY, ADMIN_PASSWORD, SECRET_KEY, JWT_SECRET_KEY

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
