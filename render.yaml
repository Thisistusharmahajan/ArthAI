services:
  # ── Backend (Flask) ────────────────────────────────────────
  - type: web
    name: arthaai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:create_app() --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false          # Set in Render dashboard
      - key: FLASK_DEBUG
        value: false
    disk:
      name: arthaai-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 10

  # ── Frontend (React/Vite) ──────────────────────────────────
  - type: web
    name: arthaai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://arthaai-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
